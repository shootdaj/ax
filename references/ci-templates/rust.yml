name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: cargo test --lib --bins -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    {{#IF_SERVICES}}
    services:
      {{SERVICES_BLOCK}}
    {{/IF_SERVICES}}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        {{#IF_SERVICES}}
        env:
          {{SERVICES_ENV}}
        {{/IF_SERVICES}}
        run: cargo test --test '*' -v

  scenario-tests:
    name: Scenario Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    {{#IF_SERVICES}}
    services:
      {{SERVICES_BLOCK}}
    {{/IF_SERVICES}}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run scenario tests
        {{#IF_SERVICES}}
        env:
          {{SERVICES_ENV}}
        {{/IF_SERVICES}}
        run: cargo test --test 'scenario_*' -v
